<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamentos Psi. Ionete</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc; /* Slate 50 - Fundo Suave #f8fafc */
        }
        
        /* Classes utilitárias para as cores da marca (fácil alteração) */
        .brand-patient-primary { background-color: #0ea5e9; } /* Blue 500 */
        .brand-patient-secondary { background-color: #f0f9ff; } /* Blue 50 */
        .brand-psychologist-primary { background-color: #0f172a; } /* Slate 900 */
        
        /* Transições suaves para mudança de visualização */
        .view-transition {
            transition: opacity 0.3s ease-in-out;
        }

        /* Esconder elementos inicialmente */
        .hidden { display: none; }

        /* Estilos do Bloco da Profissional (Cirúrgico) */
        .profile-container {
        display: flex;
        flex-direction: column;
        align-items: center;  /* Centraliza tudo na tela */
        text-align: center;
        margin-bottom: 24px;  /* Cria um "respiro" entre o texto e os campos de login */
        }

        .profile-image {
        width: 90px;          /* Tamanho não tão grande, elegante */
        height: 90px;         /* Deve ser igual à largura para ficar um círculo perfeito */
        border-radius: 50%;   /* É isto que transforma em círculo */
        object-fit: cover;    /* Garante que a foto não fique espremida ou esticada */
        border: 2px solid #E5E7EB; /* Uma borda cinza super fina e sutil */
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); /* Sombra flutuante bem leve */
        margin-bottom: 12px;
        }

        .profile-title {
        font-size: 1.25rem;
        font-weight: 600;
        color: #1F2937;       /* Um cinza chumbo, mais moderno que o preto absoluto */
        margin: 0;
        }

        .profile-subtitle {
        font-size: 0.875rem;
        color: #6B7280;       /* Um tom mais claro para não poluir a leitura */
        margin-top: 4px;
        }
    </style>
</head>
<body class="min-h-screen">

    <nav id="main-nav" class="bg-white shadow-sm border-b border-slate-200 hidden">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center">
                    <span class="text-2xl font-bold text-slate-800 tracking-tight">Psi<span class="text-sky-500">.</span>Ionete</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="user-display-name" class="text-sm font-medium text-slate-600"></span>
                    <button onclick="authService.logout()" class="text-sm text-red-600 hover:text-red-800 font-medium">Sair</button>
                </div>
            </div>
        </div>
    </nav>

    

    <main id="app-container" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div id="loader" class="flex justify-center items-center h-64">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-sky-500"></div>
        </div>
    </main>

    <div id="notification-container" class="fixed bottom-5 right-5 z-50 space-y-2"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="js/config.js"></script>

    <script src="js/auth.js"></script>
    <script src="js/database.js"></script>
    <script src="js/patient-dashboard.js"></script>
    <script src="js/admin-dashboard.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
